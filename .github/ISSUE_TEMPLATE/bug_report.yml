name: Bug report
description: Report a reproducible app problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include private device IDs, screenshots, or logs unless they are necessary and safe to share publicly.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the visible behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Select ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Include hardware details only when relevant.
