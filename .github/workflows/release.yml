name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer without leading v, for example 1.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Release version must be SemVer, for example 1.0.1 or 1.0.1-beta.1."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (Test-Path -LiteralPath "$nsisPath\makensis.exe") {
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Restore
        run: dotnet restore AudioCameraControlPanel.sln

      - name: Build
        run: dotnet build AudioCameraControlPanel.sln --no-restore

      - name: Test
        run: dotnet test AudioCameraControlPanel.sln --no-build

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Version $env:RELEASE_VERSION

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path artifacts\publish-win-x64\* `
            -DestinationPath artifacts\AudioCameraMasterWidget-win-x64-self-contained.zip `
            -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AudioCameraMasterWidget-release-assets
          path: |
            artifacts/AudioCameraMasterWidgetSetup.exe
            artifacts/AudioCameraMasterWidget-win-x64-self-contained.zip
          if-no-files-found: error

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            "artifacts\AudioCameraMasterWidgetSetup.exe#AudioCameraMasterWidgetSetup.exe",
            "artifacts\AudioCameraMasterWidget-win-x64-self-contained.zip#AudioCameraMasterWidget-win-x64-self-contained.zip"
          )

          $args = @(
            "release",
            "create",
            $env:RELEASE_TAG
          ) + $assets + @(
            "--title",
            "Audio Camera Master Widget $env:RELEASE_TAG",
            "--generate-notes"
          )

          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $args += @("--target", $env:GITHUB_SHA)
          }

          if ($env:RELEASE_VERSION -like "*-*") {
            $args += "--prerelease"
          }

          gh @args
